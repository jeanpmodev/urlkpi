server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name www.djangoocto.com;
	root /var/www/djangoocto.com/public;

	# SSL
	ssl_certificate /etc/letsencrypt/live/djangoocto.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/djangoocto.com/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/djangoocto.com/chain.pem;

	# security
	include nginxconfig.io/security.conf;

	# logging
	access_log /var/log/nginx/djangoocto.com.access.log;
	error_log /var/log/nginx/djangoocto.com.error.log warn;

	# reverse proxy
	location / {
		proxy_pass http://127.0.0.1:3000;
		include nginxconfig.io/proxy.conf;
	}

	# additional config
	include nginxconfig.io/general.conf;
}

# non-www, subdomains redirect
server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name .djangoocto.com;

	# SSL
	ssl_certificate /etc/letsencrypt/live/djangoocto.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/djangoocto.com/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/djangoocto.com/chain.pem;

	return 301 https://www.djangoocto.com$request_uri;
}

# HTTP redirect
server {
	listen 80;
	listen [::]:80;

	server_name .djangoocto.com;

	include nginxconfig.io/letsencrypt.conf;

	location / {
		return 301 https://www.djangoocto.com$request_uri;
	}
}