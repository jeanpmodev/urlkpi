{% load service_tags %}
<style>
  ion-icon {
  font-size: 43px;
}
</style>
<section style="background: linear-gradient(90deg, rgba(205,255,216,1) 0%, rgba(148,185,255,1) 65%);">
  {% for service in service_list %}
  <label class="w-112 inline-flex cursor-pointer p-4 mb-2 mt-2 rounded-md shadow-lg" style="background: linear-gradient(90deg, rgba(205,255,216,1) 0%, rgba(148,185,255,1) 65%);">
  <div class="me-2.5">
    <ion-icon name="cube-outline"></ion-icon> {{ service.service_name }}
    <p class="text-sm font-normal text-body select-none">{{ service.service_on_content }}</p>
    <p>{{ service.service_name |check_service }}</p>
  </div>
    <input type="checkbox" value="" class="sr-only peer">
  <div><ion-icon name="toggle-outline"></ion-icon></div>
</label>
  {% endfor %}
</section>
