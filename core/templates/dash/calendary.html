<div class="grid grid-cols-2 gap-4 ">
  <div class="bg-blue-500 p-6 text-white rounded-md"><div class="max-w-md mx-auto p-6 bg-white rounded-2xl shadow-xl border border-gray-100">
    <!-- Calendar Header -->
    <div class="flex items-center justify-between mb-6 ">
      <h2 class="text-xl font-bold text-gray-800">June 2026</h2>
      <div class="flex gap-2">
        <button class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600">
          <style>
            
            ion-icon {
              font-size: 43px;
              color: green;
            }
          </style>
          <ion-icon class="hover:animate-bounce" name="arrow-back-circle-outline"></ion-icon>
        </button>
        <button class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600">
          <ion-icon class="hover:animate-bounce" name="arrow-forward-circle-outline"></ion-icon>
        </button>
      </div>
    </div>

    <!-- Days of the Week Grid Headers -->
    <div class="grid grid-cols-7 gap-2 mb-4 text-center text-sm font-semibold bg-gradient-to-r from-blue-700 to-orange-600 bg-clip-text text-transparent ">
      <div>Sun</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
    </div>

    <!-- Monthly Dates Grid -->
    <!-- "grid-cols-7" splits the row uniformly into 7 days -->
    <div class="grid grid-cols-7 gap-2 text-center text-sm">
      <!-- Empty placeholder slots for padding previous month offsets -->
      <!-- June 2026 starts on a Monday, so we pad 1 empty grid space for Sunday -->
      <div class="p-3 text-gray-500">31</div>

      {% for key, value in datetimesdys.items %}
        {% if value == 0 %}
               <button class="p-3 font-medium text-gray-900 hover:bg-cyan-150 hover:text-cyan-600 rounded-xl transition-all">{{ key }}</button>             
        {% endif %}
        {% if value != 0 %}
               <button onclick="showerros({{ value }})" class="p-3 font-medium text-gray-900 bg-blue-500 hover:bg-cyan-150 hover:text-cyan-600 rounded-xl transition-all">{{ key }}</button>             
        {% endif %}
      {% endfor %}
      <!-- Trailing days from the next month -->
      <div class="p-3 text-gray-500">1</div>
      <div class="p-3 text-gray-500">2</div>
      <div class="p-3 text-gray-500">3</div>
      <div class="p-3 text-gray-500">4</div>
    </div>
  </div></div>
  <div class="bg-blue-200 p-6 rounded-md"><div class="progress-container">
    <div id="number-display" class="number text-[8rem] font-bold bg-gradient-to-r from-blue-700 to-orange-600 bg-clip-text text-transparent uppercase"> {{error_amount}} errors</div>

    <script>

      function showerros(errors) {   
    const targetNumber = errors; // The end number
    const duration = 3500;    // Animation duration in milliseconds 

    const numberDisplay = document.getElementById('number-display');

    let startTime = null;

    function counter_counter(currentTime) {
      if (!startTime) startTime = currentTime;
      const timeElapsed = currentTime - startTime;
      
      // Calculate current progress fraction (capped at 1)
      const progressFraction = Math.min(timeElapsed / duration, 1);
      
      // 1. Update the central number
      const currentNumber = Math.floor(progressFraction * targetNumber);
      numberDisplay.textContent = `${currentNumber} Errors`;
      
      if (timeElapsed < duration) {
        requestAnimationFrame(counter_counter);
      }
    }

    // Initialize the animation loop
    requestAnimationFrame(counter_counter);
  }
let startTime = null;
</script>
</div></div>
</div>
